server:
  port: 8084

spring:
  application:
    name: notification-service
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

notification:
  from: ${NOTIFICATION_FROM:noreply@releases.local}

logging:
  level:
    com.kata.notification: DEBUG
